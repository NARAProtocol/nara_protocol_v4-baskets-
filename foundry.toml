[profile.default]
src = "src"
test = "test"
out = "out"
libs = ["lib"]
solc_version = "0.8.34"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true

remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/"
]

[profile.ci]
fuzz = { runs = 1000 }
invariant = { runs = 256, depth = 64 }
